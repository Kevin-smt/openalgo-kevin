[databases]
openalgo = host=127.0.0.1 port=5433 dbname=openalgo
openalgo_logs = host=127.0.0.1 port=5433 dbname=openalgo_logs
openalgo_latency = host=127.0.0.1 port=5433 dbname=openalgo_latency
openalgo_sandbox = host=127.0.0.1 port=5433 dbname=openalgo_sandbox
openalgo_health = host=127.0.0.1 port=5433 dbname=openalgo_health

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = md5
auth_file = userlist.txt
pool_mode = transaction
default_pool_size = 20
max_client_conn = 1000
server_idle_timeout = 600
client_idle_timeout = 0
ignore_startup_parameters = extra_float_digits
admin_users = postgres
stats_users = postgres
server_reset_query = DISCARD ALL
server_reset_query_always = 0
query_wait_timeout = 120
reserve_pool_size = 5
reserve_pool_timeout = 5
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0
